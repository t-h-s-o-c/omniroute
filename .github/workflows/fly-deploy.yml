name: Deploy to Fly.io
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
      - name: Deploy
        run: |
          $HOME/.fly/bin/flyctl deploy --app omniroute-t1ugsa --region sin --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}